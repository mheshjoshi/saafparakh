<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saaf Parakh AI - Premium Lab Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #040814; --panel-bg: rgba(11, 19, 43, 0.75); --neon-cyan: #00f2fe; --neon-red: #ff1744; --text-light: #f8fafc; }
        /* आपके ओरिजिनल CSS को सुरक्षित रखा गया है */
        body { background: var(--bg-dark); color: var(--text-light); font-family: 'Outfit', sans-serif; min-height: 100vh; padding: 40px 20px; display: flex; justify-content: center; align-items: center; }
        .wrapper { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr 1.1fr; gap: 40px; }
        .main-panel { background: var(--panel-bg); padding: 40px; border-radius: 32px; backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }
        .scanner-box { border: 2px dashed var(--neon-cyan); padding: 40px; text-align: center; border-radius: 24px; cursor: pointer; margin-bottom: 20px; }
        .map-card { background: rgba(255, 23, 68, 0.05); border: 1px solid var(--neon-red); padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .map-card:hover { transform: translateY(-5px); background: rgba(255, 23, 68, 0.1); }
        .coin-badge { background: linear-gradient(90deg, #ffd700, #ff8c00); padding: 5px 15px; border-radius: 20px; color: black; font-weight: 800; font-size: 14px; margin-bottom: 20px; display: inline-block; }
        .btn-action { width: 100%; background: linear-gradient(90deg, #4facfe, #00f2fe); padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; color: #040814; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="left-side">
        <div class="ai-bubble" id="aiBubble">"Hey! I am Saaf Parakh AI. Let's filter out hidden chemicals!"</div>
    </div>

    <div class="main-panel">
        <div class="panel-header-area">
            <div class="coin-badge">💰 Super Coins: <span id="coinCount">0</span></div>
            <h1>Saaf <span>Parakh</span> AI</h1>
        </div>

        <div class="scanner-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📸</div>
            <div id="boxM">Take a photo or choose a file</div>
            <input type="file" id="fileInput" onchange="processScan()" style="display:none">
        </div>

        <div class="map-card" onclick="alert('Opening Live Danger Map...')">
            <span style="font-size: 30px;">📍</span>
            <div>
                <strong style="color: var(--neon-red);">Live Danger Map</strong><br>
                <small>Check contaminated items nearby</small>
            </div>
        </div>

        <button class="btn-action" onclick="processScan()">🚀 Analyze Purity</button>
    </div>
</div>

<script>
    let coins = 0;
    function processScan() {
        // यहाँ AI प्रोसेसिंग का सिमुलेशन है
        coins += 20; 
        document.getElementById('coinCount').innerText = coins;
        alert("Scan Completed! You earned 20 Super Coins.");
    }
</script>
</body>
</html>
