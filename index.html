<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saaf Parakh AI - Premium Lab</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #040814; --panel-bg: rgba(11, 19, 43, 0.85); --neon-cyan: #00f2fe; --neon-red: #ff1744; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(rgba(4, 8, 20, 0.9), rgba(4, 8, 20, 0.9)), 
                        url('https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Outfit', sans-serif; padding: 20px; 
            display: flex; justify-content: center; min-height: 100vh; 
        }
        .container { width: 100%; max-width: 500px; }
        .wallet-badge { background: linear-gradient(90deg, #ffd700, #ff8c00); padding: 8px 16px; border-radius: 20px; color: black; font-weight: 800; display: inline-block; margin-bottom: 15px; }
        .header-section { background: rgba(0, 242, 254, 0.1); padding: 20px; border-radius: 20px; border: 1px solid var(--neon-cyan); margin-bottom: 20px; line-height: 1.5; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .scanner-box { border: 2px dashed var(--neon-cyan); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 15px; cursor: pointer; background: rgba(0,0,0,0.3); }
        #result-container { margin-bottom: 20px; padding: 20px; background: rgba(0, 242, 254, 0.05); border: 1px solid var(--neon-cyan); border-radius: 20px; display: none; }
        .result-text { color: white; line-height: 1.6; }
        .map-box { background: rgba(255, 23, 68, 0.1); border: 1px solid var(--neon-red); padding: 15px; border-radius: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .map-box:hover { background: rgba(255, 23, 68, 0.2); transform: scale(1.02); }
        #map { display: none; height: 250px; border-radius: 16px; border: 2px solid var(--neon-red); margin-bottom: 15px; }
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="container">
    <div class="wallet-badge">💰 Super Coins: <span id="coinCount">0</span></div>
    <div class="header-section">"Hey! I am Saaf Parakh AI. Let's filter out hidden chemicals together!"</div>
    <div class="grid">
        <div class="card">🍕<br>Food</div><div class="card">🥛<br>Dairy</div>
        <div class="card">💊<br>Supplements</div><div class="card">🍎<br>Fresh</div>
    </div>
    <h1>Saaf Parakh AI</h1>
    <div class="scanner-box" onclick="document.getElementById('fileInput').click()">
        📸 Take a photo<br>
        <input type="file" id="fileInput" style="display:none;" onchange="handleFile(this)">
    </div>
    <div id="result-container">
        <h3 style="color: var(--neon-cyan);">🔍 Analysis Report</h3>
        <div id="result-text" class="result-text"></div>
    </div>
    <div class="map-box" onclick="toggleMapOptions()">📍 <strong>Live Danger Map</strong></div>
    <div id="map"></div>
    <div class="btn-row">
        <button class="btn" style="background: var(--neon-cyan);" onclick="addCoins()">🚀 Analyze Purity</button>
        <button class="btn" style="background: #ff1744; color: white;">⚠️ Danger Report</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let coins = 0;
    function addCoins() { coins += 10; document.getElementById('coinCount').innerText = coins; }

    function toggleMapOptions() {
        let choice = confirm("Do you want to see the Embedded Map here?");
        if (choice) {
            let mapDiv = document.getElementById('map');
            mapDiv.style.display = 'block';
            var map = L.map('map').setView([20.5937, 78.9629], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([20.5937, 78.9629]).addTo(map).bindPopup("Danger Zone!");
        } else {
            window.open('https://www.google.com/maps', '_blank');
        }
    }

    // AI Analysis Engine
    async function handleFile(input) {
        if(input.files.length > 0) {
            const container = document.getElementById('result-container');
            const resultText = document.getElementById('result-text');
            container.style.display = 'block';
            resultText.innerHTML = "<em>Analyzing with AI...</em>";
            
            // API KEY यहाँ जोड़ें (लाइन 93)
            const MY_API_KEY = "AIzaSyBInqBCCFqeBdseGVpstzw2Z32nlZRDd_g"; 
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Analyze the ingredients of this food product for chemicals and give a safety report." }] }] })
                });
                const data = await response.json();
                resultText.innerHTML = data.candidates[0].content.parts[0].text;
                addCoins();
            } catch (error) {
                resultText.innerHTML = "⚠️ AI Error. Please check your API Key.";
            }
        }
    }
</script>
</body>
</html>
