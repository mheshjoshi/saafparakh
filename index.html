<div id="map-container" style="display:none; height: 300px; width: 100%; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--neon-red);">
    <div id="map" style="height: 100%; width: 100%; border-radius: 18px;"></div>
</div>

<div class="map-box" onclick="toggleMap()">
    <span style="font-size: 24px;">📍</span>
    <div>
        <strong style="color: var(--neon-red);">Live Danger Map</strong><br>
        <small style="opacity: 0.8;">Tap to toggle local danger zones</small>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    var map;
    function toggleMap() {
        var container = document.getElementById('map-container');
        if (container.style.display === 'none') {
            container.style.display = 'block';
            if (!map) {
                map = L.map('map').setView([20.5937, 78.9629], 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([20.5937, 78.9629]).addTo(map).bindPopup("Danger Zone: Contaminated food detected!");
            }
        } else {
            container.style.display = 'none';
        }
    }
</script>
