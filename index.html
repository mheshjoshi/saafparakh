<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saaf Parakh AI - Premium Lab Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* तुम्हारा ओरिजिनल प्रीमियम CSS */
        :root { --bg-dark: #040814; --panel-bg: rgba(11, 19, 43, 0.75); --neon-cyan: #00f2fe; --neon-red: #ff1744; --text-light: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Outfit', 'Noto Sans Devanagari', sans-serif; padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-image: radial-gradient(circle at 80% 20%, rgba(0, 242, 254, 0.15), transparent 50%); }
        .wrapper { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr 1.1fr; gap: 40px; }
        .main-panel { background: var(--panel-bg); padding: 40px; border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px); }
        .scanner-box { border: 2px dashed rgba(0, 242, 254, 0.25); border-radius: 24px; padding: 40px 20px; text-align: center; cursor: pointer; margin-bottom: 25px; }
        .preview-img { width: 100%; max-height: 260px; object-fit: contain; border-radius: 16px; display: none; margin-bottom: 15px; }
        .btn-action { width: 100%; background: linear-gradient(90deg, #4facfe, #00f2fe); padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; color: #040814; margin-bottom: 15px; }
        .map-box { background: rgba(255, 23, 68, 0.05); border: 1px solid var(--neon-red); padding: 15px; border-radius: 16px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="left-side">
        <div class="ai-bubble" id="aiBubble">"Hey! Scan your food pack to detect hidden chemicals."</div>
    </div>

    <div class="main-panel">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h1 id="t1">Saaf Parakh AI</h1>
            <select id="langSelector" class="lang-select" onchange="switchLanguage()">
                <option value="en">EN</option>
                <option value="hi">HI</option>
            </select>
        </div>

        <div class="scanner-box" onclick="document.getElementById('fileInput').click()">
            <img id="imagePreview" class="preview-img">
            <div id="uploadPrompt">📸 <span id="boxM">Take a photo or choose a file</span></div>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="loadPreview(event)">

        <button class="btn-action" onclick="runAnalysis()">🚀 <span id="btnTxt">Analyze Purity</span></button>

        <div class="map-box" onclick="alert('Opening Danger Map...')">
            <span style="font-size: 24px;">📍</span>
            <div>
                <h4 id="mapTitle">Live Danger Map</h4>
                <p id="mapDesc" style="font-size: 12px; opacity: 0.7;">Check nearby contaminated items</p>
            </div>
        </div>
    </div>
</div>

<script>
    const supabase = supabasejs.createClient('https://ohhwmjfgfvmcuisdqnrh.supabase.co', 'AIzaSyChFWz5S3tPru_zGBWDvDQLcVYskd_wcdU');
    
    const loc = {
        en: { bubble: "Hey! Scan your food pack.", boxM: "Take a photo or choose a file", btn: "Analyze Purity", mapTitle: "Live Danger Map", mapDesc: "Check nearby contaminated items" },
        hi: { bubble: "नमस्ते! अपने खाद्य पैकेट को स्कैन करें।", boxM: "फोटो लें या फाइल चुनें", btn: "शुद्धता की जांच करें", mapTitle: "डेंजर मैप", mapDesc: "आस-पास के मिलावटी उत्पादों को देखें" }
    };

    function switchLanguage() {
        const l = document.getElementById('langSelector').value;
        document.getElementById('aiBubble').innerText = loc[l].bubble;
        document.getElementById('boxM').innerText = loc[l].boxM;
        document.getElementById('btnTxt').innerText = loc[l].btn;
        document.getElementById('mapTitle').innerText = loc[l].mapTitle;
        document.getElementById('mapDesc').innerText = loc[l].mapDesc;
    }

    function loadPreview(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('uploadPrompt').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }

    async function runAnalysis() {
        const file = document.getElementById('fileInput').files[0];
        if(!file) return alert("Please upload a photo!");
        const { error } = await supabase.from('reports').insert([{ product_name: "User Scan", danger_level: 'High' }]);
        alert(error ? "Error!" : "Reported successfully!");
    }
</script>
</body>
</html>
