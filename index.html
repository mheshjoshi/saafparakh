<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saaf Parakh AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #040814; --neon: #00f2fe; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .header-section { background: rgba(0, 242, 254, 0.1); padding: 15px; border-radius: 15px; border: 1px solid var(--neon); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; text-align: center; }
        .map-btn { width: 100%; background: rgba(255, 255, 255, 0.1); border: 1px solid #4facfe; padding: 15px; border-radius: 15px; color: white; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .action-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: right; margin-bottom: 10px; color: var(--neon);">💰 Coins: <span id="coinCount">0</span></div>

    <div class="header-section">
        "Hey! I am Saaf Parakh AI. Show me the ingredients or lab-report. Let's filter out hidden chemicals!"
    </div>

    <h3>WHAT CAN YOU CHECK?</h3>
    <div class="grid">
        <div class="card">🍕<br>Packaged Food</div>
        <div class="card">🥛<br>Dairy & Milk</div>
        <div class="card">💊<br>Supplements</div>
        <div class="card">🍎<br>Fresh Items</div>
    </div>

    <h1>Saaf Parakh AI</h1>

    <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 10px;">
        📸 Take a photo or choose a file<br>
        <input type="file" id="fileInput" onchange="addCoins()">
    </div>

    <button class="map-btn">📍 <div><strong>Live Danger Map</strong><br>Check near contaminate products</div></button>

    <div class="action-row">
        <button class="btn" style="background: var(--neon);" onclick="addCoins()">🚀 Analyze Purity</button>
        <button class="btn" style="background: #ff1744; color: white;">⚠️ Danger Report</button>
    </div>
</div>

<script>
    let coins = 0;
    function addCoins() {
        coins += 10;
        document.getElementById('coinCount').innerText = coins;
    }
</script>
</body>
</html>
