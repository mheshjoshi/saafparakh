    <style>
        /* Pulse Animation for Live Map */
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 23, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0); } }
        .map-box { 
            background: rgba(255, 23, 68, 0.05); 
            border: 1px solid var(--neon-red); 
            padding: 15px; 
            border-radius: 16px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            cursor: pointer; 
            animation: pulse 2s infinite; /* यह उसे 'Live' जैसा लुक देगा */
            transition: 0.4s;
        }
        .map-box:hover { transform: scale(1.02); background: rgba(255, 23, 68, 0.15); }
        .map-icon { font-size: 30px; position: relative; }
    </style>

    <div class="map-box" onclick="window.open('https://www.google.com/maps/search/food+safety+danger+zones', '_blank')">
        <div class="map-icon">📍</div>
        <div>
            <strong style="color: var(--neon-red);">Live Danger Map</strong><br>
            <small style="opacity: 0.8;">Tap to see real-time contaminant zones</small>
        </div>
        <div style="margin-left: auto; font-size: 20px;">➔</div>
    </div>
