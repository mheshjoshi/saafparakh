<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saaf Parakh AI | Pro Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2fe; --bg: #040814; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .dashboard { max-width: 500px; margin: auto; background: #0b132b; padding: 30px; border-radius: 30px; border: 1px solid var(--neon); box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); }
        .coin-box { font-size: 20px; font-weight: bold; color: var(--neon); margin-bottom: 20px; }
        .btn { background: linear-gradient(90deg, #4facfe, #00f2fe); border: none; padding: 15px 40px; border-radius: 15px; cursor: pointer; font-weight: 800; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>Saaf <span>Parakh</span> AI</h1>
    <div class="coin-box" id="wallet">💰 Wallet: 0 Coins</div>
    
    <div id="upload-zone" style="border: 2px dashed var(--neon); padding: 40px; border-radius: 20px; margin: 20px 0;">
        <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
        <p>📷 फोटो अपलोड करें</p>
    </div>
    
    <button class="btn" onclick="submitData()">🚀 शुद्धता की जांच करें</button>
</div>

<script>
    // Supabase Config
    const supabaseUrl = 'https://ohhwmjfgfvmcuisdqnrh.supabase.co';
    const supabaseKey = 'AIzaSyChFWz5S3tPru_zGBWDvDQLcVYskd_wcdU';
    const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

    let currentBalance = 0;

    // रिपोर्ट सबमिट फंक्शन
    async function submitData() {
        const productName = prompt("प्रॉडक्ट का नाम क्या है?");
        if(!productName) return;

        // Supabase में डेटा भेजें
        const { error } = await supabase
            .from('reports')
            .insert([{ product_name: productName, danger_level: 'High' }]);

        if (error) {
            alert("Error: " + error.message);
        } else {
            currentBalance += 10;
            document.getElementById('wallet').innerText = `💰 Wallet: ${currentBalance} Coins`;
            alert("सफलता! रिपोर्ट दर्ज हुई। आपको 10 कॉइन्स मिले!");
        }
    }

    function previewImage(event) {
        alert("इमेज सिलेक्ट हो गई! अब 'शुद्धता की जांच करें' दबाएं।");
    }
</script>
</body>
</html>
