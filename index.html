<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saaf Parakh AI - Premium Lab</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #040814; --neon-cyan: #00f2fe; --neon-red: #ff1744; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(rgba(4, 8, 20, 0.9), rgba(4, 8, 20, 0.9)), 
                        url('https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; font-family: 'Outfit', sans-serif; padding: 20px; 
            min-height: 100vh; display: flex; justify-content: center; 
        }
        
        .container { width: 100%; max-width: 500px; }
        .wallet-badge { background: linear-gradient(90deg, #ffd700, #ff8c00); padding: 8px 16px; border-radius: 20px; color: black; font-weight: 800; display: inline-block; margin-bottom: 15px; }
        .scanner-box { border: 2px dashed var(--neon-cyan); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 15px; cursor: pointer; background: rgba(0,0,0,0.3); }
        
        /* Map Styling */
        #map { height: 250px; border-radius: 20px; border: 2px solid var(--neon-red); margin-bottom: 15px; background: #000; }
        
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <div class="wallet-badge">💰 Super Coins: <span id="coinCount">0</span></div>
    
    <div class="scanner-box" onclick="document.getElementById('fileInput').click()">
        📸 Take a photo or choose a file<br>
        <input type="file" id="fileInput" style="display:none;" onchange="addCoins()">
    </div>

    <div id="map"></div>

    <div class="btn-row">
        <button class="btn" style="background: var(--neon-cyan);" onclick="addCoins()">🚀 Analyze Purity</button>
        <button class="btn" style="background: #ff1744; color: white;">⚠️ Danger Report</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize Map
    var map = L.map('map').setView([20.5937, 78.9629], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([20.5937, 78.9629]).addTo(map).bindPopup("Danger Alert: Contaminated Item Found!");

    let coins = 0;
    function addCoins() {
        coins += 10;
        document.getElementById('coinCount').innerText = coins;
    }
</script>
</body>
</html>
