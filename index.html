<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saaf Parakh AI - Final Unified Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #040814; --neon-cyan: #00f2fe; --neon-red: #ff1744; --text-light: #f8fafc; }
        body { background: var(--bg-dark); color: var(--text-light); font-family: 'Outfit', sans-serif; padding: 20px; }
        .wrapper { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .main-panel { background: rgba(11, 19, 43, 0.9); padding: 40px; border-radius: 32px; border: 1px solid rgba(0, 242, 254, 0.2); }
        .btn-action { width: 100%; background: linear-gradient(90deg, #4facfe, #00f2fe); padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .map-box { background: #0b132b; padding: 20px; border-radius: 20px; border: 1px solid var(--neon-red); margin-top: 20px; }
        .preview-img { width: 100%; max-height: 260px; object-fit: contain; border-radius: 16px; display: none; }
        @media (max-width: 950px) { .wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="left-side">
        <h1 id="t1">Saaf Parakh AI</h1>
        <div id="aiBubble" class="ai-bubble">"Hey! Scan your food pack to detect hidden chemicals."</div>
        </div>

    <div class="main-panel">
        <select id="langSelector" class="lang-select" onchange="switchLanguage()">
            <option value="en">English</option>
            <option value="hi">हिंदी</option>
        </select>

        <div class="scanner-box" onclick="document.getElementById('fileInput').click()">
            <img id="imagePreview" class="preview-img">
            <div id="uploadPrompt">📸 <span id="boxM">Upload Photo</span></div>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="loadPreview(event)">

        <button class="btn-action" onclick="runAnalysis()">🚀 <span id="btnTxt">Analyze Purity</span></button>

        <div class="map-box">
            <h3 id="mapTitle" style="color: var(--neon-red);">📍 Live Danger Map</h3>
            <p id="mapDesc">Users reporting contaminated products nearby.</p>
            <div id="mapContainer" style="height: 150px; background: #040814; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                Map View Loaded
            </div>
        </div>
    </div>
</div>

<script>
    const supabase = supabasejs.createClient('https://ohhwmjfgfvmcuisdqnrh.supabase.co', 'AIzaSyChFWz5S3tPru_zGBWDvDQLcVYskd_wcdU');

    const loc = {
        en: { t1: "Saaf Parakh AI", boxM: "Upload Photo", btn: "Analyze Purity", mapTitle: "Live Danger Map", mapDesc: "Users reporting contaminated products nearby." },
        hi: { t1: "साफ़ परख एआई", boxM: "फोटो अपलोड करें", btn: "शुद्धता की जांच करें", mapTitle: "डेंजर मैप", mapDesc: "आस-पास के मिलावटी उत्पादों की रिपोर्ट।" }
    };

    function switchLanguage() {
        const l = document.getElementById('langSelector').value;
        document.getElementById('t1').innerText = loc[l].t1;
        document.getElementById('boxM').innerText = loc[l].boxM;
        document.getElementById('btnTxt').innerText = loc[l].btn;
        document.getElementById('mapTitle').innerText = loc[l].mapTitle;
        document.getElementById('mapDesc').innerText = loc[l].mapDesc;
    }

    function loadPreview(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('imagePreview');
            img.src = e.target.result;
            img.style.display = 'block';
            document.getElementById('uploadPrompt').style.display = 'none';
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    async function runAnalysis() {
        const file = document.getElementById('fileInput').files[0];
        if(!file) return alert("Upload a photo first!");
        
        // Supabase Report
        const { error } = await supabase.from('reports').insert([{ product_name: "Scanned Item", danger_level: 'High' }]);
        error ? alert("Database Error!") : alert("Reported to Danger Map!");
    }
</script>
</body>
</html>
