<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saaf Parakh AI | Premium Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #040814; --neon: #00f2fe; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; padding: 20px; transition: all 0.3s; }
        .container { max-width: 500px; margin: auto; }
        
        /* Premium UI */
        .glass-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(0,242,254,0.5); }
        
        /* Interactive Elements */
        .btn { padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:active { transform: scale(0.95); }
        
        /* Progress Bar for trust */
        #progress-container { width: 100%; height: 5px; background: #222; border-radius: 5px; margin-top: 10px; display: none; }
        #progress-bar { height: 100%; background: var(--neon); width: 0%; border-radius: 5px; transition: width 1s; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <select id="lang" onchange="translatePage()" style="background:none; color:var(--neon); border:1px solid var(--neon); padding:5px; border-radius:8px;">
            <option value="en">English</option>
            <option value="hi">हिंदी</option>
        </select>
        <div class="neon-text">💰 Coins: <span id="coinCount">0</span></div>
    </div>

    <div class="glass-card" id="aiBubble">
        "Hey! I am Saaf Parakh AI. Show me your food pack ingredients."
    </div>

    <h3>WHAT CAN YOU CHECK?</h3>
    <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
        <div class="glass-card" style="padding: 10px; text-align: center;">🍕 Packaged</div>
        <div class="glass-card" style="padding: 10px; text-align: center;">🥛 Dairy</div>
    </div>

    <h1>Saaf Parakh AI</h1>

    <div class="glass-card" onclick="document.getElementById('fileInput').click()" style="text-align: center; cursor: pointer; border: 2px dashed var(--neon);">
        📸 Upload Photo
        <input type="file" id="fileInput" onchange="startAnalysis()" style="display:none;">
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <button class="btn" style="width:100%; background: var(--neon);" onclick="startAnalysis()">🚀 Analyze Purity</button>
</div>

<script>
    let coins = 0;
    function startAnalysis() {
        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('progress-bar').style.width = '100%';
        setTimeout(() => {
            coins += 10;
            document.getElementById('coinCount').innerText = coins;
            alert("Analysis Complete! 10 Coins Earned.");
            document.getElementById('progress-container').style.display = 'none';
        }, 1500);
    }

    function translatePage() {
        const lang = document.getElementById('lang').value;
        const bubble = document.getElementById('aiBubble');
        bubble.innerText = (lang === 'hi') ? "नमस्ते! मैं साफ़ परख AI हूँ। अपनी खाद्य सामग्री दिखाएं।" : "Hey! I am Saaf Parakh AI. Show me your food pack ingredients.";
    }
</script>
</body>
</html>
