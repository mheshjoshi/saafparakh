<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saaf Parakh AI - Adaptive Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #040814;
            --panel-bg: rgba(11, 19, 43, 0.75);
            --neon-cyan: #00f2fe;
            --neon-blue: #4facfe;
            --neon-green: #00e676;
            --neon-red: #ff1744;
            --text-light: #f8fafc;
            --text-gray: #94a3b8;
            --border-glow: rgba(0, 242, 254, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Outfit', 'Noto Sans Devanagari', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(0, 242, 254, 0.12), transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(79, 172, 254, 0.12), transparent 50%),
                linear-gradient(rgba(4, 8, 20, 0.9), rgba(4, 8, 20, 0.97)),
                url('https://images.unsplash.com/photo-1543339308-43e59d6b73a6?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* MASTER WRAPPER: Desktop me 2 Columns, Mobile me 1 Column automatically */
        .wrapper {
            width: 100%;
            max-width: 1150px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            align-items: start;
            transition: all 0.3s ease;
        }

        /* LEFT SIDE LAYOUT */
        .left-side {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .ai-bubble {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.12), rgba(0, 242, 254, 0.12));
            border-left: 4px solid var(--neon-cyan);
            padding: 22px;
            border-radius: 0 24px 24px 24px;
            font-size: 16px;
            line-height: 1.6;
            color: #e2e8f0;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--neon-cyan);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 20px 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .category-card:hover {
            background: rgba(0, 242, 254, 0.06);
            border-color: rgba(0, 242, 254, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.1);
        }

        .cat-icon { font-size: 32px; margin-bottom: 8px; display: block; }
        .cat-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .cat-desc { font-size: 12px; color: var(--text-gray); }

        /* RIGHT SIDE LAYOUT (MAIN SCANNER PANEL) */
        .main-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 35px;
            backdrop-filter: blur(25px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        /* HEADER FIX: Responsive flex container without overlapping */
        .panel-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }

        .brand-info { flex: 1; }
        .brand-badge {
            font-size: 12px;
            font-weight: 800;
            color: var(--neon-blue);
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .brand-info h1 { font-size: 28px; font-weight: 800; color: white; }
        .brand-info h1 span { color: var(--neon-cyan); }

        .lang-select {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
        }

        .lang-select:hover { border-color: var(--neon-cyan); }

        .scanner-box {
            border: 2px dashed rgba(0, 242, 254, 0.25);
            border-radius: 24px;
            padding: 50px 20px;
            text-align: center;
            background: rgba(0, 242, 254, 0.01);
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .scanner-box:hover {
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 254, 0.04);
        }

        .upload-icon { font-size: 48px; margin-bottom: 12px; }
