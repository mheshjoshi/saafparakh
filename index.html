<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saaf Parakh AI | Final Unified App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* प्रीमियम डार्क स्टाइल */
        body { background: #040814; color: #fff; font-family: 'Outfit', sans-serif; padding: 20px; text-align: center; }
        .dashboard { max-width: 500px; margin: auto; background: rgba(11, 19, 43, 0.9); padding: 30px; border-radius: 30px; border: 1px solid #00f2fe; }
        .lang-box { margin-bottom: 20px; }
        .btn { background: linear-gradient(90deg, #4facfe, #00f2fe); border: none; padding: 15px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        #scanner-box { border: 2px dashed #00f2fe; padding: 40px; margin: 20px 0; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="lang-box">
        <select id="lang" onchange="applyLang()">
            <option value="en">English</option>
            <option value="hi">हिंदी</option>
        </select>
    </div>

    <h1 id="t1">Saaf Parakh AI</h1>
    <div id="w1">💰 Wallet: 0 Coins</div>

    <div id="scanner-box" onclick="document.getElementById('f1').click()">
        <p id="t2">📸 Upload / फोटो अपलोड करें</p>
        <input type="file" id="f1" style="display:none" onchange="processImg()">
    </div>

    <button class="btn" id="b1" onclick="saveData()">🚀 Check Purity / शुद्धता की जांच करें</button>
    <button class="btn" id="b2" onclick="openMap()" style="background: #ff1744;">📍 View Danger Map / डेंजर मैप देखें</button>
</div>

<script>
    // Supabase Config
    const supabase = supabasejs.createClient('https://ohhwmjfgfvmcuisdqnrh.supabase.co', 'AIzaSyChFWz5S3tPru_zGBWDvDQLcVYskd_wcdU');

    // Language Data
    const langData = {
        en: { t1: "Saaf Parakh AI", w1: "Wallet: 0 Coins", t2: "Upload Photo", b1: "Check Purity", b2: "View Danger Map" },
        hi: { t1: "साफ़ परख एआई", w1: "वॉलेट: 0 सिक्के", t2: "फोटो अपलोड करें", b1: "शुद्धता की जांच करें", b2: "डेंजर मैप देखें" }
    };

    function applyLang() {
        const l = document.getElementById('lang').value;
        document.getElementById('t1').innerText = langData[l].t1;
        document.getElementById('w1').innerText = langData[l].w1;
        document.getElementById('t2').innerText = langData[l].t2;
        document.getElementById('b1').innerText = langData[l].b1;
        document.getElementById('b2').innerText = langData[l].b2;
    }

    async function saveData() {
        const item = prompt("Product Name?");
        if(!item) return;
        const { error } = await supabase.from('reports').insert([{ product_name: item, danger_level: 'High' }]);
        error ? alert("Error!") : alert("Reported Successfully!");
    }

    function openMap() {
        alert("Redirecting to your Danger Map...");
    }

    function processImg() { alert("Image Received!"); }
</script>
</body>
</html>
