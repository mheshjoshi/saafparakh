<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saaf Parakh AI - Multi-Language</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #151d30;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #233554;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Top Bar & Language Selector */
        .top-bar {
            width: 100%;
            max-width: 480px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .lang-select {
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .logo-area {
            margin-bottom: 15px;
        }

        .badge {
            background: rgba(37, 99, 235, 0.15);
            color: #60a5fa;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 10px;
            border: 1px solid rgba(37, 99, 235, 0.3);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Upload Area */
        .upload-box {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(21, 29, 48, 0.5);
            position: relative;
        }

        .upload-box:hover {
            border-color: var(--accent);
            background: rgba(37, 99, 235, 0.02);
        }

        .icon-container {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 5px;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--text-muted);
        }

        #fileInput {
            display: none;
        }

        .preview-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 12px;
            display: none;
            margin-bottom: 15px;
        }

        /* Action Button */
        .btn-action {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn-action:hover {
            background: var(--accent-hover);
        }

        /* Result Section */
        .result-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: left;
            display: none;
        }

        .result-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #60a5fa;
        }

        .result-text {
            font-size: 14px;
            line-height: 1.6;
            color: #e2e8f0;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        /* Loader */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <select class="lang-select" id="langSelector" onchange="changeLanguage()">
            <option value="en">English</option>
            <option value="hi">हिन्दी (Hindi)</option>
        </select>
    </div>

    <div class="container">
        <div class="logo-area">
            <span class="badge" id="badgeText">SAAF PARAKH LABS V2.0</span>
            <h1 id="mainTitle">Saaf Parakh AI</h1>
            <p class="subtitle" id="mainSubtitle">Scan your product to check its quality and details instantly</p>
        </div>

        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <img id="imagePreview" class="preview-img" alt="Preview">
            <div id="uploadPrompt">
                <div class="icon-container">📸</div>
                <div class="upload-text" id="boxTitle">Take a photo or choose a file</div>
                <div class="upload-hint" id="boxHint">Supports JPG, PNG, WEBP</div>
            </div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)">

        <button class="btn-action" id="actionBtn" onclick="analyzeProduct()">
            <span id="btnText">Start Analysis</span>
            <div class="loader" id="btnLoader"></div>
        </button>

        <div class="result-box" id="resultBox">
            <div class="result-title" id="resTitle">Analysis Result:</div>
            <div class="result-text" id="analysisResult">
                Your report will appear here...
            </div>
        </div>
    </div>

    <script>
        // Language Dictionary
        const translations = {
            en: {
                badge: "SAAF PARAKH LABS V2.0",
                title: "Saaf Parakh AI",
                subtitle: "Scan your product to check its quality and details instantly",
                boxTitle: "Take a photo or choose a file",
                boxHint: "Supports JPG, PNG, WEBP",
                btnText: "Start Analysis",
                btnLoading: "Analyzing...",
                resTitle: "Analysis Result:",
                defaultRes: "Your report will appear here..."
            },
            hi: {
                badge: "साफ़ परख लैब्स V2.0",
                title: "साफ़ परख एआई",
                subtitle: "सामान की शुद्धता और क्वालिटी की तुरंत जांच करें",
                boxTitle: "सामान की फोटो खींचें या चुनें",
                boxHint: "JPG, PNG, WEBP फोटो सपोर्टेड है",
                btnText: "डेटा जांच शुरू करें",
                btnLoading: "जांच की जा रही है...",
                resTitle: "जांच का परिणाम:",
                defaultRes: "आपकी रिपोर्ट यहाँ दिखाई देगी..."
            }
        };

        let currentLang = 'en';

        // Change Language Function
        function changeLanguage() {
            currentLang = document.getElementById('langSelector').value;
            const t = translations[currentLang];

            document.getElementById('badgeText').innerText = t.badge;
            document.getElementById('mainTitle').innerText = t.title;
            document.getElementById('mainSubtitle').innerText = t.subtitle;
            document.getElementById('boxTitle').innerText = t.boxTitle;
            document.getElementById('boxHint').innerText = t.boxHint;
            if (document.getElementById('btnText').style.display !== 'none') {
                document.getElementById('btnText').innerText = t.btnText;
            }
            document.getElementById('resTitle').innerText = t.resTitle;
        }

        // Show Image Preview
        function handleImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('uploadPrompt').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        // Dummy AI Trigger Action
        function analyzeProduct() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) {
                alert(currentLang === 'hi' ? "कृपया पहले एक फोटो चुनें!" : "Please select an image first!");
                return;
            }

            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('analysisResult');

            // Show Loading State
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            resultBox.style.display = 'none';

            setTimeout(() => {
                // Done Loading
                btnText.style.display = 'block';
                btnText.innerText = translations[currentLang].btnText;
                btnLoader.style.display = 'none';
                resultBox.style.display = 'block';

                // Language Wise Results
                if (currentLang === 'hi') {
                    resultText.innerHTML = "• <b>सामान का प्रकार:</b> खाद्य पदार्थ / पैकेट उत्पाद<br>• <b>स्थिति:</b> फोटो सफलतापूर्ण प्राप्त हुई।<br>• <i>नोट: असली AI एनालिसिस के लिए अपनी Gemini API Key को बैकएंड से कनेक्ट करें।</i>";
                } else {
                    document.getElementById('resTitle').innerText = "Analysis Result:";
                    resultText.innerHTML = "• <b>Product Type:</b> Food item / Packaged Product<br>• <b>Status:</b> Image received successfully.<br>• <i>Note: Connect your Gemini API Key in the backend for real-time AI analysis.</i>";
                }
            }, 2000);
        }
    </script>
</body>
</html>
